<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCP Host Tester</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; height: 320px;
           overflow-y: auto; margin-bottom: 1rem; background: #fafafa; }
    .msg  { margin: .35rem 0; white-space: pre-wrap; }
    .user { color: #1a56db; }
    .host { color: #057a55; }
    .sys  { color: #777; font-style: italic; }
    textarea { width: 100%; box-sizing: border-box; font: inherit; }
    button { margin-top: .5rem; padding: .4rem 1rem; }
  </style>
</head>
<body>
  <h1>MCP Host Tester</h1>
  <div id="log"></div>
  <textarea id="input" rows="3" placeholder="Ask something..."></textarea>
  <br />
  <button id="send">Send</button>

  <!--
    Reference client for the MCP host API. This page is for local testing only; the platform
    front end implements the same contract against the backend /api endpoints:

      1. POST /api/session        -> establishes the session cookie. Call once on load.
      2. POST /api/chat {message} -> enqueues a message; returns { status: "accepted" } immediately.
      3. GET  /api/messages       -> returns { messages: [...] } queued since the last poll
                                     (progress lines and the final answer) and clears them.
                                     Poll on an interval while the page is open.

    All three rely on the same session cookie, so requests must send cookies (same-origin
    fetch does this by default).
  -->
  <script>
    const POLL_INTERVAL_MS = 1000;

    const log = document.getElementById("log");
    const sendBtn = document.getElementById("send");
    const input = document.getElementById("input");

    function append(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function poll() {
      try {
        const res = await fetch("/api/messages");
        const { messages } = await res.json();
        for (const m of messages) append(m, "host");
      } catch {
        // transient network error; the next tick retries
      }
    }

    async function init() {
      // Establish the session cookie before sending or polling, so every request resolves to
      // the same server-side session.
      const res = await fetch("/api/session", { method: "POST" });
      const { sessionId } = await res.json();
      append("session: " + sessionId, "sys");

      // Pull buffered messages on a fixed interval (no WebSocket).
      setInterval(poll, POLL_INTERVAL_MS);
    }

    sendBtn.addEventListener("click", async () => {
      const message = input.value.trim();
      if (!message) return;
      append(message, "user");
      input.value = "";

      // The answer arrives later via /api/messages.
      await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
    });

    init();
  </script>
</body>
</html>
