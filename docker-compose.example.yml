# Committed template. Copy to docker-compose.yml (gitignored) and adjust to taste:
#   cp docker-compose.example.yml docker-compose.yml
#
# MCP server endpoint addresses change inside a container: "http://localhost:..." now points at
# the container itself. For an MCP server running on your host machine, use
# http://host.docker.internal:... (the extra_hosts entry below makes that resolve on Linux too;
# Docker Desktop on Mac/Windows resolves it out of the box). For an MCP server that's itself
# another compose service, use that service's name instead.
services:
  maverik:
    build: .
    ports:
      - "5088:8080"                       # host:container — keeps the familiar local URL
    env_file:
      - .env   # copy .env.example -> .env and fill in real values. Every name defined there
               # is loaded straight into the container's environment, so anything you reference
               # as "${VAR_NAME}" in mcp-servers.json headers or llm-models.json's apiKey
               # resolves against it — add new variables there, no compose-file edits needed.
    volumes:
      # Config: mounted read-only, never baked into the image.
      - ./llm-models.json:/app/llm-models.json:ro
      - ./mcp-servers.json:/app/mcp-servers.json:ro
      - ./agents.json:/app/agents.json:ro
      - ./prompts:/app/prompts:ro
      - ./maverik-suites:/app/maverik-suites:ro
      # Output: mounted read-write so runs/logs survive the container.
      - ./results:/app/results
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach MCP servers on the host (needed on Linux)
